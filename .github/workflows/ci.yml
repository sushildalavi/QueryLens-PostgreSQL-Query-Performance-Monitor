name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: pip install -r backend/requirements.txt

      - name: Lint (ruff)
        run: cd backend && python -m ruff check app/ tests/

      - name: Unit tests (no Docker required)
        run: cd backend && pytest tests/test_fingerprint.py tests/test_explain_parser.py tests/test_regression_detector.py -v

      - name: Integration tests (Docker)
        run: cd backend && pytest tests/test_collector.py tests/test_api_smoke.py -v
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: frontend

      - name: TypeScript + build
        run: npm run build
        working-directory: frontend
